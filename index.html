<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulasi Alam Semesta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
        background-color: #020617; 
        margin: 0; 
        overflow: hidden; 
        color: white; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pointer-events-none > * { pointer-events: auto; }
    .fade-enter { opacity: 0; transform: scale(0.95); transition: all 0.3s ease; pointer-events: none; }
    .fade-enter-active { opacity: 1; transform: scale(1); pointer-events: auto; }

    /* Loading screen spin animation */
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin-reverse { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    #loadingSpinOuter { animation: spin-slow 3s linear infinite; }
    #loadingSpinInner { animation: spin-reverse 2s linear infinite; }
  </style>
</head>
<body>

  <!-- Layar Loading -->
  <div id="loadingScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#020617]" style="transition: opacity 0.5s ease;">
    <div class="relative flex items-center justify-center mb-8 w-24 h-24">
      <div id="loadingSpinOuter" class="absolute w-24 h-24 rounded-full border-t-4 border-b-4 border-cyan-400 opacity-80"></div>
      <div id="loadingSpinInner" class="absolute w-16 h-16 rounded-full border-l-4 border-r-4 border-purple-500 opacity-60"></div>
      <div class="absolute w-4 h-4 bg-white rounded-full shadow-[0_0_20px_#fff]"></div>
    </div>
    <h1 id="loadingPercent" class="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 mb-2">0%</h1>
    <p id="loadingText" class="text-xs text-slate-400 font-mono">Menghubungkan ke Server Kosmik...</p>
  </div>

  <!-- Kanvas Utama -->
  <div class="absolute inset-0 z-0">
    <canvas id="simCanvas" class="w-full h-full cursor-pointer block" style="background: radial-gradient(circle at center, #0f172a 0%, #020617 80%)"></canvas>
  </div>

  <!-- Lapisan Antarmuka (UI) -->
  <div id="uiLayer" class="absolute inset-0 z-10 pointer-events-none p-4 md:p-6 hidden">
    
    <!-- Pencarian -->
    <div class="absolute top-4 left-4 md:top-6 md:left-6 w-[calc(100%-2rem)] md:w-72 pointer-events-auto">
      <div class="relative">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-cyan-400" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Cari (Planet, Quasar...)" class="w-full pl-10 pr-4 py-3 bg-slate-900/80 border border-slate-700/60 focus:border-cyan-500/80 rounded-2xl text-sm outline-none backdrop-blur-md shadow-xl text-white" />
        <div id="searchResults" class="absolute mt-2 bg-slate-900/95 border border-slate-700/50 rounded-2xl shadow-2xl w-full max-h-60 overflow-y-auto hide-scrollbar hidden text-white"></div>
      </div>
    </div>

    <!-- Menu Bawah -->
    <div class="absolute bottom-6 left-[44%] -translate-x-1/2 flex flex-col items-center pointer-events-auto w-max max-w-[80vw] z-20">
      <div class="flex items-center gap-1 p-1.5 bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-full shadow-2xl mb-2">
        <div class="relative">
          <button id="menuBtn" class="p-2 mx-1 rounded-full hover:bg-slate-800 text-cyan-400 transition">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
        <div class="w-px h-6 bg-slate-700/60 mx-1"></div>
        <div id="mainMenuContainer" class="flex items-center overflow-x-auto hide-scrollbar"></div>
      </div>
      <div class="text-[10px] text-cyan-500/70 font-mono tracking-widest font-bold uppercase">Solar sistem for Razeerh</div>
    </div>

    <!-- SubMenu — terpusat di layar, di luar bottom menu agar tidak terpotong -->
    <div id="subMenu" class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-900/97 border border-slate-700/60 rounded-2xl p-3 shadow-[0_0_40px_rgba(0,0,0,0.9)] fade-enter hidden pointer-events-auto z-30" style="width:min(90vw,360px); backdrop-filter:blur(20px)">
      <p class="text-[10px] text-cyan-500/70 font-mono font-bold tracking-widest uppercase text-center mb-2">Pilih Objek</p>
      <div id="subMenuContainer" class="grid grid-cols-3 gap-2 max-h-[45vh] overflow-y-auto hide-scrollbar"></div>
    </div>

    <!-- Panel Zoom -->
    <div class="absolute bottom-6 right-4 md:right-6 flex flex-col gap-2 p-1.5 bg-slate-900/70 rounded-2xl pointer-events-auto border border-slate-700/60 shadow-2xl">
      <button id="zoomInBtn" class="p-2 text-slate-400 hover:text-cyan-300 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
      <div class="w-full h-px bg-slate-700/60"></div>
      <button id="zoomResetBtn" class="p-2 text-slate-400 hover:text-cyan-300 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
      <div class="w-full h-px bg-slate-700/60"></div>
      <button id="zoomOutBtn" class="p-2 text-slate-400 hover:text-cyan-300 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
    </div>

    <!-- Panel Informasi -->
    <div id="infoPanel" class="absolute top-24 right-4 md:top-1/2 md:-translate-y-1/2 md:right-6 w-[calc(100%-2rem)] md:w-80 bg-slate-900/85 backdrop-blur-xl border border-slate-600/50 rounded-3xl p-6 pointer-events-auto shadow-[0_0_40px_rgba(0,0,0,0.5)] fade-enter hidden">
      <div class="flex justify-between items-start mb-6">
        <div class="flex gap-4 items-center">
          <div id="infoColor" class="w-12 h-12 rounded-full border-2 border-slate-600/50"></div>
          <div>
            <h2 id="infoTitle" class="text-xl font-bold text-white"></h2>
            <p id="infoCategory" class="text-xs text-cyan-400 font-medium"></p>
          </div>
        </div>
        <button id="closeInfoBtn" class="p-1.5 bg-slate-800 rounded-full text-slate-400 hover:text-white transition">✕</button>
      </div>
      <div class="flex gap-4 border-b border-slate-700/60 mb-5">
        <button class="tab-btn pb-2 text-xs font-bold border-b-2 border-cyan-400 text-cyan-400" data-tab="data">Data</button>
        <button class="tab-btn pb-2 text-xs font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-300" data-tab="struktur">Struktur</button>
        <button class="tab-btn pb-2 text-xs font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-300" data-tab="detail">Detail</button>
      </div>
      <div id="infoContent" class="min-h-[180px] max-h-[40vh] overflow-y-auto hide-scrollbar text-white"></div>
    </div>

    <div id="hintText" class="absolute top-[60%] left-1/2 -translate-x-1/2 text-[11px] text-slate-300 text-center pointer-events-none hidden bg-black/50 px-3 py-1 rounded-full backdrop-blur-sm">
      Sentuh / Klik objek untuk info panel
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        // ==========================================
        // 1. LOGIKA LOADING SCREEN — DIPERBAIKI
        // ==========================================
        const loadingScreen = document.getElementById('loadingScreen');
        const uiLayer = document.getElementById('uiLayer');
        const loadingText = document.getElementById('loadingText');
        const loadingPercent = document.getElementById('loadingPercent');

        const texts = [
            "Menghubungkan ke Server Kosmik...",
            "Menginisialisasi Kosmos...",
            "Menghitung Gravitasi...",
            "Memuat Lubang Hitam...",
            "Membuka Ruang & Waktu..."
        ];

        const duration = 4000; // 4 detik total
        const interval = 50;   // update tiap 50ms
        let elapsed = 0;

        const loadingTimer = setInterval(() => {
            elapsed += interval;
            let percent = Math.floor((elapsed / duration) * 100);
            if (percent > 100) percent = 100;

            if (loadingPercent) loadingPercent.innerText = percent + "%";

            const textIdx = Math.floor(elapsed / 900) % texts.length;
            if (loadingText) loadingText.innerText = texts[textIdx];

            if (elapsed >= duration) {
                clearInterval(loadingTimer);
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    uiLayer.classList.remove('hidden');
                    initApp();
                }, 500);
            }
        }, interval);

            const ALL_DATA = { ...SOLAR_DATA, ...DEEP_SPACE_DATA };

            // Fungsi Warna
            function lightenColor(hex, amount) {
                const n = parseInt(hex.slice(1), 16), r = Math.min(255, (n >> 16) + amount), g = Math.min(255, ((n >> 8) & 0xff) + amount), b = Math.min(255, (n & 0xff) + amount);
                return `rgb(${r},${g},${b})`;
            }
            function darkenColor(hex, amount) {
                const n = parseInt(hex.slice(1), 16), r = Math.max(0, (n >> 16) - amount), g = Math.max(0, ((n >> 8) & 0xff) - amount), b = Math.max(0, (n & 0xff) - amount);
                return `rgb(${r},${g},${b})`;
            }

            // State & Canvas Setup
            let view = "solar";

            // Zoom Controls — berlaku untuk semua view

            document.getElementById('zoomOutBtn').onclick = () => { zoom = Math.max(0.3, zoom - 0.2); deepZoom = Math.max(0.3, deepZoom - 0.2); };

            };

            const mainContainer = document.getElementById('mainMenuContainer');
            const subContainer = document.getElementById('subMenuContainer');

                    btn.innerText = v.label;

                subContainer.innerHTML = '';
                EXTRA_VIEWS.forEach(v => {
                    const btn = document.createElement('button');

                    btn.onclick = () => {

            // Info Panel

            document.querySelectorAll('.tab-btn').forEach(btn => {

            function updateInfoPanel() {
                if (!selected) {
                    infoPanel.classList.remove('fade-enter-active');
                    setTimeout(() => infoPanel.classList.add('hidden'), 300);
                    return;
                }
                infoPanel.classList.remove('hidden');

                const data = ALL_DATA[selected];
                document.getElementById('infoTitle').innerText = selected;
                document.getElementById('infoCategory').innerText = data.info.Kategori;
                document.getElementById('infoColor').style.background = data.color;
                document.getElementById('infoColor').style.boxShadow = `0 0 20px ${data.color}50`;
                
                currentTab = "data";
                document.querySelectorAll('.tab-btn')[0].click();

            function renderPanelContent() {
                if (!selected) return;
                const data = ALL_DATA[selected];

                if (currentTab === 'data') {

                    }

                    const wrap = document.createElement('div');
                    wrap.className = 'space-y-3 relative before:absolute before:inset-y-0 before:left-3 before:w-px before:bg-slate-700/50';
                    (data.layers ||[]).forEach((l, i) => {

            // Pencarian
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const indoAlias = { 
                "Matahari": "sun", "Bumi": "earth", "Bima Sakti": "milky way", "Black Hole": "lubang hitam", "Wormhole": "lubang cacing", "Nebula": "awan gas", "Pulsar": "bintang neutron", "Quasar": "inti galaksi", "Supernova": "ledakan bintang"
            };

            searchInput.oninput = (e) => {
                const val = e.target.value.toLowerCase();
                searchResults.innerHTML = '';
                if (!val) { searchResults.classList.add('hidden'); return; }
                
                let found = false;
                for (let key in ALL_DATA) {
                    const alias = indoAlias[key] ? indoAlias[key].toLowerCase() : "";
                    if (key.toLowerCase().includes(val) || alias.includes(val)) {

                        const btn = document.createElement('button');

                        btn.innerHTML = `<div class="w-2.5 h-2.5 rounded-full shadow-sm" style="background: ${ALL_DATA[key].color}"></div> ${key}`;
                        btn.onclick = () => {
                            view = ALL_DATA[key].viewId; selected = key;

                if (found) searchResults.classList.remove('hidden');
                else searchResults.classList.add('hidden');
            }
            document.addEventListener('click', (e) => {
                if (e.target !== searchInput) searchResults.classList.add('hidden');
            });

            // Klik Kanvas
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                const cx = canvas.width / 2, cy = canvas.height / 2;

                if (view === "solar") {
                    let clicked = null;
                    for (const key in SOLAR_DATA) {
                        const p = SOLAR_DATA[key];
                        let px = cx + (p.distance ? Math.cos(angles[key]) * p.distance * zoom : 0);
                        let py = cy + (p.distance ? Math.sin(angles[key]) * p.distance * zoom : 0);
                        if (Math.hypot(mx - px, my - py) < p.radius * zoom + 15) clicked = key;
                    }
                    selected = clicked; updateInfoPanel();
                } else {
                    if (Math.hypot(mx - cx, my - cy) < 150) {
                        const objName = Object.keys(DEEP_SPACE_DATA).find(k => DEEP_SPACE_DATA[k].viewId === view);
                        if (objName) { selected = objName; updateInfoPanel(); }
                    } else { selected = null; updateInfoPanel(); }
                }
            };

            // FUNGSI GAMBAR LENGKAP
            function drawBlackHole(ctx, cx, cy, frame, w, h) {
                for (let i = 0; i < 40; i++) {
                    const r = Math.random() * Math.min(w,h)/2 + 70, a = Math.random() * Math.PI * 2 + frame * 0.0005;
                    ctx.beginPath(); ctx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, Math.random()*1.5, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.8})`; ctx.fill();
                }
                const pulse = Math.sin(frame * 0.05) * 5; 
                const photonGrd = ctx.createRadialGradient(cx, cy, 35, cx, cy, 80 + pulse);
                photonGrd.addColorStop(0, "rgba(252, 211, 77, 0.9)"); photonGrd.addColorStop(0.3, "rgba(249, 115, 22, 0.5)"); photonGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 80 + pulse, 0, Math.PI * 2); ctx.fillStyle = photonGrd; ctx.fill();
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(0.15); ctx.scale(1, 0.25);
                const diskBackGrd = ctx.createRadialGradient(0, 0, 40, 0, 0, 160 + pulse);
                diskBackGrd.addColorStop(0, "transparent"); diskBackGrd.addColorStop(0.3, "rgba(252, 211, 77, 1)"); diskBackGrd.addColorStop(0.6, "rgba(239, 68, 68, 0.8)"); diskBackGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(0, 0, 160 + pulse, Math.PI, Math.PI*2); ctx.fillStyle = diskBackGrd; ctx.fill(); ctx.restore();
                ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.fillStyle = "#000000"; ctx.fill();
                ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(252, 211, 77, 0.8)"; ctx.stroke();
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(0.15); ctx.scale(1, 0.25);
                const diskFrontGrd = ctx.createRadialGradient(0, 0, 40, 0, 0, 160 + pulse);
                diskFrontGrd.addColorStop(0, "transparent"); diskFrontGrd.addColorStop(0.3, "rgba(253, 230, 138, 1)"); diskFrontGrd.addColorStop(0.6, "rgba(249, 115, 22, 0.9)"); diskFrontGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(0, 0, 160 + pulse, 0, Math.PI); ctx.fillStyle = diskFrontGrd; ctx.fill(); ctx.restore();
            }

            function drawPulsar(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Gravitational waves — cincin gelombang gravitasi menyebar
                for (let i = 0; i < 8; i++) {
                    const waveR = ((frame * 1.5 + i * 55) % (Math.min(w,h) * 0.6)) * s;
                    const waveOpacity = Math.max(0, 1 - waveR / (Math.min(w,h) * 0.6 * s));
                    ctx.beginPath(); ctx.arc(cx, cy, waveR, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(56,189,248,${waveOpacity * 0.35})`;
                    ctx.lineWidth = 2; ctx.stroke();
                }
                // Magnetosphere distortion — elips bergoyang
                ctx.save(); ctx.translate(cx, cy);
                for (let i = 0; i < 5; i++) {
                    const tilt = (i / 5) * Math.PI + frame * 0.01;
                    const rx = (60 + i * 20) * s, ry = (15 + i * 5) * s;
                    ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, tilt, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(99,215,255,${0.12 + Math.sin(frame * 0.04 + i) * 0.06})`;
                    ctx.lineWidth = 1.5; ctx.stroke();
                }
                ctx.restore();
                // Pulsar core glow
                const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 35 * s);
                grd.addColorStop(0, "#ffffff"); grd.addColorStop(0.2, "#38bdf8"); grd.addColorStop(0.6, "#0284c740"); grd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 40 * s, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
                // Rotating beams
                const angle1 = frame * 0.08, angle2 = angle1 + Math.PI;
                [angle1, angle2].forEach((a) => {
                    const pulse = Math.abs(Math.sin(frame * 0.1)) * 0.8 + 0.2;
                    ctx.save(); ctx.translate(cx, cy); ctx.rotate(a);
                    const beamGrd = ctx.createLinearGradient(0, 0, Math.min(w, h) * 0.8 * s, 0);
                    beamGrd.addColorStop(0, `rgba(56,189,248,${pulse})`); beamGrd.addColorStop(0.4, `rgba(14,165,233,${pulse * 0.4})`); beamGrd.addColorStop(1, "transparent");
                    ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(Math.min(w, h) * 0.8 * s, -1); ctx.lineTo(Math.min(w, h) * 0.8 * s, 1); ctx.lineTo(0, 6);
                    ctx.fillStyle = beamGrd; ctx.fill(); ctx.restore();
                });
            }

            function drawQuasar(ctx, cx, cy, frame, w, h) {
                for (let i = 0; i < 50; i++) {
                    const r = (frame * 2 + i * 20) % (Math.min(w,h)), a = (i * Math.PI * 2) / 50;
                    ctx.beginPath(); ctx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, Math.random()*2, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${1 - r/Math.min(w,h)})`; ctx.fill();
                }
                const pulse = Math.sin(frame * 0.1) * 10;
                const coreGrd = ctx.createRadialGradient(cx, cy, 10, cx, cy, 120 + pulse);
                coreGrd.addColorStop(0, "#ffffff"); coreGrd.addColorStop(0.2, "#a855f7"); coreGrd.addColorStop(0.5, "#3b82f680"); coreGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 120 + pulse, 0, Math.PI * 2); ctx.fillStyle = coreGrd; ctx.fill();
                ctx.save(); ctx.translate(cx, cy);
                const jetPulse = Math.random() * 0.3 + 0.7, jetGrd = ctx.createLinearGradient(0, -h/2, 0, h/2);
                jetGrd.addColorStop(0, "transparent"); jetGrd.addColorStop(0.3, `rgba(168, 85, 247, ${jetPulse})`); jetGrd.addColorStop(0.5, "#ffffff"); jetGrd.addColorStop(0.7, `rgba(168, 85, 247, ${jetPulse})`); jetGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-40, -h/2); ctx.lineTo(40, -h/2); ctx.lineTo(15, 0); ctx.lineTo(40, h/2); ctx.lineTo(-40, h/2); ctx.lineTo(-15, 0);
                ctx.fillStyle = jetGrd; ctx.fill(); ctx.restore();
            }

            function drawNebula(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Layer 1: bintang latar
                for (let i = 0; i < 80; i++) {
                    const sx = (cx + Math.cos(i * 2.4) * (w * 0.48)) * 1;
                    const sy = (cy + Math.sin(i * 1.7) * (h * 0.48)) * 1;
                    const br = (Math.sin(frame * 0.03 + i) + 1) * 0.5;
                    ctx.beginPath(); ctx.arc(sx, sy, Math.random() * 1.2 + 0.2, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${br * 0.7})`; ctx.fill();
                }
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.0008);
                // Layer 2: awan gas berwarna-warni dengan glow kuat
                const nebColors = [
                    [236, 72, 153],  // pink
                    [56, 189, 248],  // cyan
                    [168, 85, 247],  // purple
                    [251, 191, 36],  // amber
                    [52, 211, 153],  // teal
                ];
                for (let i = 0; i < 14; i++) {
                    const a = (i / 14) * Math.PI * 2;
                    const breathe = Math.sin(frame * 0.015 + i * 0.7) * 25;
                    const dist = (80 + i * 18 + breathe) * s;
                    const x = Math.cos(a + frame * 0.002) * dist;
                    const y = Math.sin(a + frame * 0.002) * dist * 0.7;
                    const r = (90 + Math.sin(frame * 0.02 + i) * 30) * s;
                    const col = nebColors[i % nebColors.length];
                    const opacity = 0.25 + Math.sin(frame * 0.02 + i) * 0.1;
                    const cloudGrd = ctx.createRadialGradient(x, y, 0, x, y, r);
                    cloudGrd.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},${opacity + 0.15})`);
                    cloudGrd.addColorStop(0.5, `rgba(${col[0]},${col[1]},${col[2]},${opacity})`);
                    cloudGrd.addColorStop(1, `rgba(${col[0]},${col[1]},${col[2]},0)`);
                    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = cloudGrd; ctx.fill();
                }
                // Layer 3: debu pekat di tengah
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 + frame * 0.001;
                    const dist = (20 + i * 12) * s;
                    const x = Math.cos(a) * dist, y = Math.sin(a) * dist;
                    const dustGrd = ctx.createRadialGradient(x, y, 0, x, y, 50 * s);
                    dustGrd.addColorStop(0, `rgba(10,5,20,0.6)`);
                    dustGrd.addColorStop(1, `rgba(10,5,20,0)`);
                    ctx.beginPath(); ctx.arc(x, y, 50 * s, 0, Math.PI*2); ctx.fillStyle = dustGrd; ctx.fill();
                }
                // Layer 4: bintang proto di inti
                const coreGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 30 * s);
                coreGlow.addColorStop(0, `rgba(255,255,220,${0.7 + Math.sin(frame * 0.05) * 0.2})`);
                coreGlow.addColorStop(0.4, `rgba(200,180,255,0.4)`);
                coreGlow.addColorStop(1, `rgba(0,0,0,0)`);
                ctx.beginPath(); ctx.arc(0, 0, 30 * s, 0, Math.PI*2); ctx.fillStyle = coreGlow; ctx.fill();
                ctx.restore();
            }

            function drawSupernova(ctx, cx, cy, frame, w, h) {
                const ringRadius = 80 + (frame * 0.5) % 80, ringOpacity = 1 - ((ringRadius - 80) / 80);
                ctx.beginPath(); ctx.arc(cx, cy, ringRadius, 0, Math.PI*2);
                ctx.lineWidth = 4; ctx.strokeStyle = `rgba(251, 146, 60, ${ringOpacity * 0.6})`; ctx.stroke();
                for(let i=0; i<30; i++) {
                    const a = (i/30)*Math.PI*2 + frame*0.01, r = 30 + Math.sin(frame*0.05 + i)*25;
                    ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r, cy+Math.sin(a)*r, 4, 0, Math.PI*2); ctx.fillStyle = `rgba(239, 68, 68, 0.5)`; ctx.fill();
                }
                const coreGrd = ctx.createRadialGradient(cx,cy,0, cx,cy, 70);
                coreGrd.addColorStop(0, "#ffffff"); coreGrd.addColorStop(0.3, "#fdba74"); coreGrd.addColorStop(0.7, "#ea580c80"); coreGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx,cy, 70, 0, Math.PI*2); ctx.fillStyle = coreGrd; ctx.fill();
            }

            function drawWormhole(ctx, cx, cy, frame, w, h) {
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(-frame * 0.005);
                for(let i=0; i<24; i++) {
                    const a = (i/24)*Math.PI*2;
                    ctx.beginPath();
                    for(let r=10; r<w; r+=15) {
                        const swirl = a + r*0.008, x = Math.cos(swirl)*r, y = Math.sin(swirl)*r;
                        if(r===10) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    }
                    ctx.strokeStyle = `rgba(94, 234, 212, ${0.1 + Math.sin(frame*0.02 + i)*0.15})`; ctx.lineWidth = 1.5; ctx.stroke();
                }
                ctx.restore();
                const coreGrd = ctx.createRadialGradient(cx,cy,0, cx,cy, 40);
                coreGrd.addColorStop(0, "#000000"); coreGrd.addColorStop(0.6, "#0f172a"); coreGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx,cy, 50, 0, Math.PI*2); ctx.fillStyle = coreGrd; ctx.fill();
            }

            function drawGalaxy(ctx, cx, cy, frame, w, h, type) {
                const isAndromeda = type === "andromeda", arms = isAndromeda ? 4 : 2, coreColor = isAndromeda ? "rgba(186,230,253,1)" : "rgba(253,230,138,1)", colorArr = isAndromeda ?[125, 211, 252] :[252, 211, 77];
                for (let arm = 0; arm < arms; arm++) {
                    const baseAngle = (arm / arms) * Math.PI * 2 - frame * (isAndromeda ? 0.0015 : 0.002);
                    for (let i = 0; i < 300; i++) {
                        const t = i / 300, spiral = t * Math.PI * 5 + baseAngle, r = t * Math.min(w, h) * 0.45;
                        const scatter = (Math.random() - 0.5) * (30 * (1-t) + 5), x = cx + Math.cos(spiral) * r + scatter, y = cy + Math.sin(spiral) * r * (isAndromeda ? 0.3 : 0.4) + scatter * 0.3;
                        ctx.beginPath(); ctx.arc(x, y, Math.random() * 1.5 + 0.2, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${colorArr[0]},${colorArr[1]},${colorArr[2]},${(1 - t) * 0.7 + 0.1})`; ctx.fill();
                    }
                }
                const coreGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
                coreGrd.addColorStop(0, "#ffffff"); coreGrd.addColorStop(0.3, coreColor); coreGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.fillStyle = coreGrd; ctx.fill();
            }

            function drawMagnetar(ctx, cx, cy, frame, w, h) {
                const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
                grd.addColorStop(0, "#ffffff"); grd.addColorStop(0.3, "#e879f9"); grd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 45, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.05);
                for(let i=0; i<16; i++){
                    ctx.beginPath(); ctx.ellipse(0, 0, 100 + Math.sin(frame*0.1)*20, 20, i * Math.PI/8, 0, Math.PI*2);
                    ctx.strokeStyle = `rgba(232, 121, 249, ${0.2 + Math.sin(frame*0.2+i)*0.2})`; ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.restore();
            }

            function drawBinaryStar(ctx, cx, cy, frame, w, h) {
                const a1 = frame * 0.02, a2 = a1 + Math.PI;
                const x1 = cx + Math.cos(a1)*40, y1 = cy + Math.sin(a1)*40;
                const x2 = cx + Math.cos(a2)*90, y2 = cy + Math.sin(a2)*90;
                const g1 = ctx.createRadialGradient(x1, y1, 0, x1, y1, 60);
                g1.addColorStop(0, "#ffffff"); g1.addColorStop(0.3, "#818cf8"); g1.addColorStop(1, "transparent");
