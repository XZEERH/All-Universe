                const g2 = ctx.createRadialGradient(x2, y2, 0, x2, y2, 20);
                g2.addColorStop(0, "#ffffff"); g2.addColorStop(0.5, "#cbd5e1"); g2.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(x2, y2, 20, 0, Math.PI * 2); ctx.fillStyle = g2; ctx.fill();
            }

            function drawUYScuti(ctx, cx, cy, frame, w, h) {
                const r = Math.min(w,h)*0.35 + Math.sin(frame*0.03)*15;
                const grd = ctx.createRadialGradient(cx, cy, r*0.2, cx, cy, r);
                grd.addColorStop(0, "#fef08a"); grd.addColorStop(0.6, "#f97316"); grd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = grd; ctx.fill();
                for(let i=0; i<12; i++){
                    const a = (i/12)*Math.PI*2 + frame*0.005;
                    const flareR = r + Math.sin(frame*0.1 + i)*20;
                    ctx.beginPath(); ctx.arc(cx+Math.cos(a)*flareR, cy+Math.sin(a)*flareR, 15, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(239, 68, 68, 0.4)"; ctx.fill();
                }
            }

            function drawExoplanet(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Bintang induk bergerak mengorbit
                const starOrbitR = 110 * s;
                const starA = frame * 0.008;
                const starX = cx + Math.cos(starA) * starOrbitR * 0.5 - w * 0.15;
                const starY = cy + Math.sin(starA) * starOrbitR * 0.3 - h * 0.15;
                const starGrd = ctx.createRadialGradient(starX, starY, 0, starX, starY, 55 * s);
                starGrd.addColorStop(0, "#fff8dc"); starGrd.addColorStop(0.3, "#f87171"); starGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(starX, starY, 55 * s, 0, Math.PI*2); ctx.fillStyle = starGrd; ctx.fill();

                // Planet - rotasi, ukuran berubah dgn zoom
                const pr = Math.min(w,h) * 0.3 * s;
                const planetY = cy + h * 0.05;

                // Shadow sisi planet (malam)
                ctx.save(); ctx.translate(cx, planetY);
                const pGrd = ctx.createRadialGradient(pr * 0.2, -pr * 0.2, 0, 0, 0, pr);
                pGrd.addColorStop(0, "#2dd4bf"); pGrd.addColorStop(0.45, "#0f766e"); pGrd.addColorStop(0.75, "#064e3b"); pGrd.addColorStop(1, "#022c22");
                ctx.beginPath(); ctx.arc(0, 0, pr, 0, Math.PI*2); ctx.fillStyle = pGrd; ctx.fill();

                // Benua bergerak (simulasi rotasi)
                ctx.save(); ctx.clip(); ctx.rotate(frame * 0.004);
                for (let i = 0; i < 7; i++) {
                    const ca = (i / 7) * Math.PI * 2;
                    const cx2 = Math.cos(ca) * pr * 0.5, cy2 = Math.sin(ca) * pr * 0.4;
                    ctx.beginPath(); ctx.arc(cx2, cy2, pr * (0.15 + i * 0.04), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(5,46,37,${0.5 + Math.sin(i) * 0.2})`; ctx.fill();
                }
                ctx.restore();

                // Awan bergerak
                ctx.save(); ctx.clip(); ctx.rotate(-frame * 0.006);
                for (let i = 0; i < 5; i++) {
                    const ca = (i / 5) * Math.PI * 2 + 0.5;
                    const cx3 = Math.cos(ca) * pr * 0.55, cy3 = Math.sin(ca) * pr * 0.55;
                    ctx.beginPath(); ctx.arc(cx3, cy3, pr * 0.18, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(180,250,240,0.15)`; ctx.fill();
                }
                ctx.restore();

                // Night side shadow
                const nightGrd = ctx.createRadialGradient(pr * 0.4, 0, 0, -pr * 0.1, 0, pr * 1.1);
                nightGrd.addColorStop(0, "transparent"); nightGrd.addColorStop(0.6, "transparent"); nightGrd.addColorStop(1, "rgba(0,0,0,0.7)");
                ctx.beginPath(); ctx.arc(0, 0, pr, 0, Math.PI*2); ctx.fillStyle = nightGrd; ctx.fill();

                // Atmosfer glow
                const atmGrd = ctx.createRadialGradient(0, 0, pr, 0, 0, pr + 18 * s);
                atmGrd.addColorStop(0, "rgba(45,212,191,0.3)"); atmGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(0, 0, pr + 18 * s, 0, Math.PI*2); ctx.fillStyle = atmGrd; ctx.fill();
                ctx.restore();
            }

            function drawDarkMatter(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Filamen kosmik — jaring antar galaksi
                ctx.save(); ctx.translate(cx, cy);
                for (let i = 0; i < 18; i++) {
                    const a = (i / 18) * Math.PI * 2;
                    const len = Math.min(w,h) * 0.45 * s;
                    const sway = Math.sin(frame * 0.008 + i * 0.5) * 20;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    const mx2 = Math.cos(a + 0.3) * len * 0.5 + sway;
                    const my2 = Math.sin(a + 0.3) * len * 0.5 + sway;
                    const ex = Math.cos(a) * len, ey = Math.sin(a) * len;
                    ctx.quadraticCurveTo(mx2, my2, ex, ey);
                    const opacity = 0.08 + Math.sin(frame * 0.015 + i) * 0.04;
                    ctx.strokeStyle = `rgba(139,92,246,${opacity})`; ctx.lineWidth = 2; ctx.stroke();
                }
                // Node galaksi — titik terang di ujung filamen
                for (let i = 0; i < 10; i++) {
                    const a = (i / 10) * Math.PI * 2 + frame * 0.001;
                    const d = (100 + i * 25) * s;
                    const nx = Math.cos(a) * d, ny = Math.sin(a) * d;
                    const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, 18 * s);
                    ng.addColorStop(0, `rgba(196,181,253,0.7)`); ng.addColorStop(1, `transparent`);
                    ctx.beginPath(); ctx.arc(nx, ny, 18 * s, 0, Math.PI*2); ctx.fillStyle = ng; ctx.fill();
                }
                // Halo gelap utama
                const haloGrd = ctx.createRadialGradient(0, 0, 10, 0, 0, 120 * s);
                haloGrd.addColorStop(0, `rgba(99,102,241,0.03)`);
                haloGrd.addColorStop(0.5, `rgba(139,92,246,0.08)`);
                haloGrd.addColorStop(1, `rgba(0,0,0,0)`);
                ctx.beginPath(); ctx.arc(0, 0, 120 * s, 0, Math.PI*2); ctx.fillStyle = haloGrd; ctx.fill();
                // Inti misterius — hampir tak terlihat, hanya shimmer
                const pulse = Math.sin(frame * 0.03) * 0.15 + 0.1;
                const coreGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, 30 * s);
                coreGrd.addColorStop(0, `rgba(199,210,254,${pulse})`); coreGrd.addColorStop(1, `transparent`);
                ctx.beginPath(); ctx.arc(0, 0, 30 * s, 0, Math.PI*2); ctx.fillStyle = coreGrd; ctx.fill();
                ctx.restore();
            }

            function drawGalacticCollision(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Dua inti galaksi bergerak saling mendekati lalu menjauh (simulasi loop)
                const t = (Math.sin(frame * 0.006) + 1) * 0.5;
                const sep = (80 + t * 120) * s;
                const cx1 = cx - sep * 0.5, cy1 = cy - 20;
                const cx2 = cx + sep * 0.5, cy2 = cy + 20;

                // Ekor pasang surut — partikel terseret
                for (let i = 0; i < 200; i++) {
                    const tt = i / 200;
                    const tailA1 = frame * 0.005 + tt * Math.PI * 3;
                    const tailR1 = tt * 160 * s;
                    const tx1 = cx1 + Math.cos(tailA1) * tailR1 * 0.4;
                    const ty1 = cy1 + Math.sin(tailA1) * tailR1 * 0.15;
                    ctx.beginPath(); ctx.arc(tx1, ty1, 1, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(252,211,77,${(1-tt)*0.4})`; ctx.fill();

                    const tailA2 = -frame * 0.005 + tt * Math.PI * 3;
                    const tx2 = cx2 + Math.cos(tailA2) * tailR1 * 0.4;
                    const ty2 = cy2 + Math.sin(tailA2) * tailR1 * 0.15;
                    ctx.beginPath(); ctx.arc(tx2, ty2, 1, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(125,211,252,${(1-tt)*0.4})`; ctx.fill();
                }

                // Galaksi 1 (kuning)
                const g1Arms = 2;
                for (let arm = 0; arm < g1Arms; arm++) {
                    const baseA = (arm / g1Arms) * Math.PI * 2 - frame * 0.003;
                    for (let i = 0; i < 120; i++) {
                        const tt = i / 120, spiral = tt * Math.PI * 4 + baseA;
                        const r = tt * 70 * s;
                        const sc = (Math.random() - 0.5) * 12;
                        ctx.beginPath(); ctx.arc(cx1 + Math.cos(spiral)*r + sc, cy1 + Math.sin(spiral)*r*0.4 + sc*0.3, Math.random()*1.5, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(252,211,77,${(1-tt)*0.6+0.1})`; ctx.fill();
                    }
                }
                // Core 1
                const core1 = ctx.createRadialGradient(cx1, cy1, 0, cx1, cy1, 25*s);
                core1.addColorStop(0, "#fff"); core1.addColorStop(0.4, "rgba(252,211,77,0.8)"); core1.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx1, cy1, 25*s, 0, Math.PI*2); ctx.fillStyle = core1; ctx.fill();

                // Galaksi 2 (biru)
                const g2Arms = 3;
                for (let arm = 0; arm < g2Arms; arm++) {
                    const baseA = (arm / g2Arms) * Math.PI * 2 + frame * 0.002;
                    for (let i = 0; i < 120; i++) {
                        const tt = i / 120, spiral = tt * Math.PI * 4 + baseA;
                        const r = tt * 70 * s;
                        const sc = (Math.random() - 0.5) * 12;
                        ctx.beginPath(); ctx.arc(cx2 + Math.cos(spiral)*r + sc, cy2 + Math.sin(spiral)*r*0.35 + sc*0.3, Math.random()*1.5, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(125,211,252,${(1-tt)*0.6+0.1})`; ctx.fill();
                    }
                }
                // Core 2
                const core2 = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, 22*s);
                core2.addColorStop(0, "#fff"); core2.addColorStop(0.4, "rgba(125,211,252,0.8)"); core2.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx2, cy2, 22*s, 0, Math.PI*2); ctx.fillStyle = core2; ctx.fill();

                // Zona tumbukan — percikan bintang baru
                if (sep < 130 * s) {
                    const colX = (cx1 + cx2) / 2, colY = (cy1 + cy2) / 2;
                    for (let i = 0; i < 30; i++) {
                        const ba = Math.random() * Math.PI * 2;
                        const br = Math.random() * 50 * s;
                        ctx.beginPath(); ctx.arc(colX + Math.cos(ba)*br, colY + Math.sin(ba)*br, Math.random()*2+0.5, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255,255,200,${Math.random() * 0.8})`; ctx.fill();
                    }
                }
            }

            function drawWhiteHole(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Bintang-bintang latar
                for (let i = 0; i < 40; i++) {
                    const r = Math.random() * Math.min(w,h)/2 + 70;
                    const a = Math.random() * Math.PI * 2 + frame * 0.0005;
                    ctx.beginPath(); ctx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, Math.random()*1.5, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.8})`; ctx.fill();
                }
                // Piringan ejeksi — kebalikan black hole, materi dilempar keluar
                const pulse = Math.sin(frame * 0.05) * 5;
                // Piringan bagian BELAKANG (bawah)
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(0.15); ctx.scale(1, 0.25);
                const diskBackGrd = ctx.createRadialGradient(0, 0, 40, 0, 0, 160 + pulse);
                diskBackGrd.addColorStop(0, "transparent");
                diskBackGrd.addColorStop(0.3, "rgba(255,255,255,1)");
                diskBackGrd.addColorStop(0.6, "rgba(186,230,253,0.8)");
                diskBackGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(0, 0, 160+pulse, Math.PI, Math.PI*2); ctx.fillStyle = diskBackGrd; ctx.fill();
                ctx.restore();
                // Inti putih menyilaukan (kebalikan lubang hitam — putih bukan hitam)
                const whiteGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40+pulse);
                whiteGrd.addColorStop(0, "rgba(255,255,255,1)");
                whiteGrd.addColorStop(0.4, "rgba(224,242,254,0.9)");
                whiteGrd.addColorStop(0.8, "rgba(147,197,253,0.4)");
                whiteGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 40+pulse, 0, Math.PI*2); ctx.fillStyle = whiteGrd; ctx.fill();
                // Garis tepi inti — putih (bukan kuning seperti BH)
                ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(224,242,254,0.95)"; ctx.lineWidth = 2; ctx.stroke();
                // Piringan bagian DEPAN (atas)
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(0.15); ctx.scale(1, 0.25);
                const diskFrontGrd = ctx.createRadialGradient(0, 0, 40, 0, 0, 160 + pulse);
                diskFrontGrd.addColorStop(0, "transparent");
                diskFrontGrd.addColorStop(0.3, "rgba(255,255,255,1)");
                diskFrontGrd.addColorStop(0.6, "rgba(186,230,253,0.9)");
                diskFrontGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(0, 0, 160+pulse, 0, Math.PI); ctx.fillStyle = diskFrontGrd; ctx.fill();
                ctx.restore();
                // Partikel dilempar keluar (kebalikan BH yang menarik masuk)
                for (let i = 0; i < 50; i++) {
                    const a = (i/50)*Math.PI*2 + frame*0.003;
                    const dist = (45 + (frame*1.5 + i*18) % (Math.min(w,h)*0.45)) * s;
                    const op = Math.max(0, 1 - dist/(Math.min(w,h)*0.45*s));
                    ctx.beginPath(); ctx.arc(cx+Math.cos(a)*dist, cy+Math.sin(a)*dist, 1.5, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(186,230,253,${op*0.7})`; ctx.fill();
                }
                // Photon ring putih
                const photonGrd = ctx.createRadialGradient(cx, cy, 35, cx, cy, 80+pulse);
                photonGrd.addColorStop(0, "rgba(255,255,255,0.9)");
                photonGrd.addColorStop(0.3, "rgba(224,242,254,0.5)");
                photonGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 80+pulse, 0, Math.PI*2); ctx.fillStyle = photonGrd; ctx.fill();
            }

            function drawProtostar(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Awan molekuler induk yang runtuh
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.0005);
                for (let i = 0; i < 12; i++) {
                    const a = (i / 12) * Math.PI * 2;
                    const dist = (100 + Math.sin(frame * 0.01 + i) * 30) * s;
                    const x = Math.cos(a) * dist, y = Math.sin(a) * dist * 0.6;
                    const cr = (60 + i * 8) * s;
                    const cg = ctx.createRadialGradient(x, y, 0, x, y, cr);
                    cg.addColorStop(0, `rgba(120,53,15,0.25)`);
                    cg.addColorStop(0.5, `rgba(180,83,9,0.12)`);
                    cg.addColorStop(1, `transparent`);
                    ctx.beginPath(); ctx.arc(x, y, cr, 0, Math.PI*2); ctx.fillStyle = cg; ctx.fill();
                }
                ctx.restore();
                // Cakram akresi berputar
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.012); ctx.scale(1, 0.28);
                for (let ring = 1; ring <= 5; ring++) {
                    const rr = (35 + ring * 22) * s;
                    const opacity = 0.5 - ring * 0.07;
                    const diskGrd = ctx.createRadialGradient(0, 0, rr * 0.7, 0, 0, rr + 10*s);
                    diskGrd.addColorStop(0, `rgba(251,191,36,${opacity})`);
                    diskGrd.addColorStop(0.6, `rgba(217,119,6,${opacity * 0.6})`);
                    diskGrd.addColorStop(1, `transparent`);
                    ctx.beginPath(); ctx.arc(0, 0, rr + 10*s, 0, Math.PI*2); ctx.fillStyle = diskGrd; ctx.fill();
                }
                ctx.restore();
                // Jet bipolar — dua semburan ke atas dan bawah
                ctx.save(); ctx.translate(cx, cy);
                [-1, 1].forEach(dir => {
                    const jetLen = Math.min(w,h) * 0.38 * s;
                    const jetGrd = ctx.createLinearGradient(0, 0, 0, dir * jetLen);
                    jetGrd.addColorStop(0, `rgba(253,230,138,0.7)`);
                    jetGrd.addColorStop(0.4, `rgba(251,191,36,0.3)`);
                    jetGrd.addColorStop(1, `transparent`);
                    ctx.beginPath();
                    ctx.moveTo(-8, 0); ctx.lineTo(-3*s, dir * jetLen); ctx.lineTo(3*s, dir * jetLen); ctx.lineTo(8, 0);
                    ctx.fillStyle = jetGrd; ctx.fill();
                });
                ctx.restore();
                // Inti proto berdenyut
                const pp = Math.sin(frame * 0.04) * 6;
                const protoGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, (28 + pp) * s);
                protoGrd.addColorStop(0, `#fffbeb`); protoGrd.addColorStop(0.4, `rgba(253,230,138,0.9)`); protoGrd.addColorStop(1, `transparent`);
                ctx.beginPath(); ctx.arc(cx, cy, (28 + pp) * s, 0, Math.PI*2); ctx.fillStyle = protoGrd; ctx.fill();
            }

            function drawDysonSphere(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                const sphereR = 130 * s;
                // Bintang di dalam
                const starGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 45 * s);
                starGrd.addColorStop(0, `#ffffff`); starGrd.addColorStop(0.3, `#fef08a`); starGrd.addColorStop(0.7, `rgba(253,224,71,0.4)`); starGrd.addColorStop(1, `transparent`);
                ctx.beginPath(); ctx.arc(cx, cy, 45 * s, 0, Math.PI*2); ctx.fillStyle = starGrd; ctx.fill();
                // Rangka megastruktur — garis kisi berputar
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.003);
                for (let i = 0; i < 18; i++) {
                    const a = (i / 18) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, sphereR, a, a + Math.PI * 2 / 18 - 0.04);
                    ctx.strokeStyle = `rgba(163,230,53,0.55)`; ctx.lineWidth = 3; ctx.stroke();
                }
                ctx.restore();
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(-frame * 0.002);
                for (let i = 0; i < 12; i++) {
                    const lat = -Math.PI/2 + (i / 11) * Math.PI;
                    const latR = Math.cos(lat) * sphereR;
                    const latY = Math.sin(lat) * sphereR * 0.35;
                    if (latR > 5) {
                        ctx.beginPath(); ctx.ellipse(0, latY, latR, latR * 0.2, 0, 0, Math.PI*2);
                        ctx.strokeStyle = `rgba(163,230,53,0.3)`; ctx.lineWidth = 1.5; ctx.stroke();
                    }
                }
                ctx.restore();
                // Panel surya — segmen berwarna
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.005);
                for (let i = 0; i < 24; i++) {
                    const a = (i / 24) * Math.PI * 2;
                    const panelX = Math.cos(a) * sphereR, panelY = Math.sin(a) * sphereR * 0.35;
                    const panelGrd = ctx.createRadialGradient(panelX, panelY, 0, panelX, panelY, 18 * s);
                    const brightness = 0.4 + Math.sin(frame * 0.05 + i) * 0.2;
                    panelGrd.addColorStop(0, `rgba(163,230,53,${brightness})`); panelGrd.addColorStop(1, `transparent`);
                    ctx.beginPath(); ctx.arc(panelX, panelY, 12 * s, 0, Math.PI*2); ctx.fillStyle = panelGrd; ctx.fill();
                }
                ctx.restore();
                // Glow luar bola
                const outerGrd = ctx.createRadialGradient(cx, cy, sphereR * 0.9, cx, cy, sphereR * 1.15);
                outerGrd.addColorStop(0, `rgba(163,230,53,0.12)`); outerGrd.addColorStop(1, `transparent`);
                ctx.beginPath(); ctx.arc(cx, cy, sphereR * 1.15, 0, Math.PI*2); ctx.fillStyle = outerGrd; ctx.fill();
            }

            function drawComet(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Komet bergerak melintasi layar dalam orbit elips
                const orbitA = frame * 0.007;
                const orbitX = Math.cos(orbitA) * w * 0.32;
                const orbitY = Math.sin(orbitA * 0.6) * h * 0.28;
                const kx = cx + orbitX, ky = cy + orbitY;

                // Arah gerak untuk menentukan arah ekor
                const vx = -Math.sin(orbitA) * w * 0.32;
                const vy = -Math.cos(orbitA * 0.6) * h * 0.28 * 0.6;
                const speed = Math.hypot(vx, vy) || 1;
                const nx = -vx / speed, ny = -vy / speed; // arah ekor berlawanan gerak

                // Ekor debu (putih/kekuningan, lebih lebar)
                const tailLen1 = 180 * s;
                for (let i = 0; i < 60; i++) {
                    const t = i / 60;
                    const spread = (Math.random() - 0.5) * 28 * t * s;
                    const tx = kx + nx * tailLen1 * t + spread;
                    const ty = ky + ny * tailLen1 * t + spread * 0.5;
                    ctx.beginPath(); ctx.arc(tx, ty, (1.5 - t) * 2, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(253,230,138,${(1 - t) * 0.5})`; ctx.fill();
                }

                // Ekor ion (biru, lebih lurus dan panjang)
                const tailLen2 = 260 * s;
                for (let i = 0; i < 80; i++) {
                    const t = i / 80;
                    const spread = (Math.random() - 0.5) * 10 * s;
                    const tx = kx + nx * tailLen2 * t + spread;
                    const ty = ky + ny * tailLen2 * t + spread;
                    ctx.beginPath(); ctx.arc(tx, ty, (1.2 - t) * 1.5, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(147,197,253,${(1 - t) * 0.6})`; ctx.fill();
                }

                // Koma — kabut gas di sekitar inti
                const komaGrd = ctx.createRadialGradient(kx, ky, 0, kx, ky, 22 * s);
                komaGrd.addColorStop(0, `rgba(255,255,255,0.9)`);
                komaGrd.addColorStop(0.4, `rgba(186,230,253,0.5)`);
                komaGrd.addColorStop(1, `transparent`);
                ctx.beginPath(); ctx.arc(kx, ky, 22 * s, 0, Math.PI*2); ctx.fillStyle = komaGrd; ctx.fill();

                // Inti es berdenyut
                const cp = Math.sin(frame * 0.1) * 1.5;
                const coreGrd = ctx.createRadialGradient(kx, ky, 0, kx, ky, (7 + cp) * s);
                coreGrd.addColorStop(0, `#ffffff`);
                coreGrd.addColorStop(0.5, `rgba(186,230,253,0.9)`);
                coreGrd.addColorStop(1, `transparent`);
                ctx.beginPath(); ctx.arc(kx, ky, (8 + cp) * s, 0, Math.PI*2); ctx.fillStyle = coreGrd; ctx.fill();

                // Matahari kecil di pojok kiri atas sebagai referensi gravitasi
                const sunGrd = ctx.createRadialGradient(cx - w*0.35, cy - h*0.35, 0, cx - w*0.35, cy - h*0.35, 30 * s);
                sunGrd.addColorStop(0, `#fff`); sunGrd.addColorStop(0.3, `rgba(253,184,19,0.8)`); sunGrd.addColorStop(1, `transparent`);
                ctx.beginPath(); ctx.arc(cx - w*0.35, cy - h*0.35, 30 * s, 0, Math.PI*2); ctx.fillStyle = sunGrd; ctx.fill();
            }

            function drawAsteroidBelt(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Matahari di tengah kiri
                const sunX = cx - w * 0.28, sunY = cy;
                const sunGrd = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 38 * s);
                sunGrd.addColorStop(0, "#fff"); sunGrd.addColorStop(0.3, "rgba(253,184,19,0.9)"); sunGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(sunX, sunY, 38 * s, 0, Math.PI*2); ctx.fillStyle = sunGrd; ctx.fill();

                // Orbit Mars
                ctx.beginPath(); ctx.arc(cx, cy, 90 * s, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(248,113,113,0.15)"; ctx.lineWidth = 1; ctx.stroke();
                // Mars
                const marsA = frame * 0.008;
                ctx.beginPath(); ctx.arc(cx + Math.cos(marsA)*90*s, cy + Math.sin(marsA)*90*s, 6*s, 0, Math.PI*2);
                ctx.fillStyle = "#f87171"; ctx.fill();

                // Sabuk asteroid — 3 ring dengan densitas berbeda
                const beltRings = [
                    { rMin: 115, rMax: 155, count: 280, color: [168,162,158] },
                    { rMin: 158, rMax: 185, count: 180, color: [120,113,108] },
                    { rMin: 188, rMax: 210, count: 100, color: [87,83,78] }
                ];
                beltRings.forEach(ring => {
                    for (let i = 0; i < ring.count; i++) {
                        const a = (i / ring.count) * Math.PI * 2 + frame * (0.001 + i * 0.000005);
                        const r = (ring.rMin + Math.random() * (ring.rMax - ring.rMin)) * s;
                        const ax = cx + Math.cos(a) * r, ay = cy + Math.sin(a) * r;
                        const size = Math.random() * 2.5 + 0.5;
                        const brightness = 0.3 + Math.random() * 0.5;
                        ctx.beginPath(); ctx.arc(ax, ay, size, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(${ring.color[0]},${ring.color[1]},${ring.color[2]},${brightness})`; ctx.fill();
                    }
                });

                // Ceres — planet kerdil terbesar di sabuk
                const ceresA = frame * 0.004 + 1.2;
                const ceresX = cx + Math.cos(ceresA) * 150 * s;
                const ceresY = cy + Math.sin(ceresA) * 150 * s;
                const ceresGrd = ctx.createRadialGradient(ceresX, ceresY, 0, ceresX, ceresY, 9*s);
                ceresGrd.addColorStop(0, "#e2e8f0"); ceresGrd.addColorStop(1, "rgba(148,163,184,0)");
                ctx.beginPath(); ctx.arc(ceresX, ceresY, 9*s, 0, Math.PI*2); ctx.fillStyle = ceresGrd; ctx.fill();
                ctx.fillStyle = "rgba(148,163,184,0.7)"; ctx.font = `${Math.max(8,9*s)}px sans-serif`; ctx.textAlign = "center";
                ctx.fillText("Ceres", ceresX, ceresY - 13*s);

                // Jupiter di kanan
                const jupA = frame * 0.002;
                const jupX = cx + Math.cos(jupA)*260*s, jupY = cy + Math.sin(jupA)*260*s;
                const jupGrd = ctx.createRadialGradient(jupX, jupY, 0, jupX, jupY, 22*s);
                jupGrd.addColorStop(0, "#fde68a"); jupGrd.addColorStop(0.6, "#d97706"); jupGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(jupX, jupY, 22*s, 0, Math.PI*2); ctx.fillStyle = jupGrd; ctx.fill();
                ctx.fillStyle = "rgba(253,230,138,0.7)"; ctx.fillText("Jupiter", jupX, jupY - 26*s);
            }

            function drawCosmicWeb(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                const nodes = [];
                // Generate node posisi tetap (seed-based)
                const seed = 42;
                for (let i = 0; i < 22; i++) {
                    const a = (i * 2.399) + seed; // golden angle
                    const r = (30 + i * 18) * s;
                    const spread = (i % 3 - 1) * 40 * s;
                    nodes.push({
                        x: cx + Math.cos(a) * r + spread,
                        y: cy + Math.sin(a) * r * 0.6 + spread * 0.4,
                        size: 3 + (i % 4) * 2.5
                    });
                }

                // Void — lingkaran gelap besar antar filamen
                const voids = [
                    { x: cx - 160*s, y: cy + 80*s, r: 70*s },
                    { x: cx + 140*s, y: cy - 90*s, r: 60*s },
                    { x: cx + 60*s, y: cy + 140*s, r: 50*s }
                ];
                voids.forEach(v => {
                    const vg = ctx.createRadialGradient(v.x, v.y, 0, v.x, v.y, v.r);
                    vg.addColorStop(0, "rgba(0,0,0,0.4)"); vg.addColorStop(1, "transparent");
                    ctx.beginPath(); ctx.arc(v.x, v.y, v.r, 0, Math.PI*2); ctx.fillStyle = vg; ctx.fill();
                });

                // Filamen — garis koneksi antar node berdenyut
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 200 * s) {
                            const pulse = 0.05 + Math.sin(frame * 0.02 + i * 0.3 + j * 0.2) * 0.04;
                            const fade = 1 - dist / (200 * s);
                            ctx.beginPath(); ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y);
                            ctx.strokeStyle = `rgba(196,181,253,${pulse * fade})`; ctx.lineWidth = 1.2; ctx.stroke();
                        }
                    }
                }

                // Node galaksi klaster
                nodes.forEach((n, i) => {
                    const pulse = Math.sin(frame * 0.025 + i * 0.5) * 0.2 + 0.6;
                    const ng = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.size * s * 2);
                    ng.addColorStop(0, `rgba(255,255,255,${pulse})`);
                    ng.addColorStop(0.4, `rgba(196,181,253,${pulse * 0.6})`);
                    ng.addColorStop(1, `transparent`);
                    ctx.beginPath(); ctx.arc(n.x, n.y, n.size * s * 2, 0, Math.PI*2); ctx.fillStyle = ng; ctx.fill();
                });

                // Superklaster di tengah
                const scGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 35*s);
                scGrd.addColorStop(0, "rgba(255,255,255,0.9)"); scGrd.addColorStop(0.3, "rgba(196,181,253,0.5)"); scGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 35*s, 0, Math.PI*2); ctx.fillStyle = scGrd; ctx.fill();
            }

            function drawRedGiant(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Denyutan atmosfer
                const pulse = Math.sin(frame * 0.025) * 18;
                const r = (Math.min(w,h) * 0.28 + pulse) * s;
                // Layer luar merah berdenyut
                for (let i = 3; i >= 1; i--) {
                    const layerR = r * (1 + i * 0.18);
                    const layerGrd = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, layerR);
                    layerGrd.addColorStop(0, `rgba(251,113,133,${0.12 - i*0.03})`);
                    layerGrd.addColorStop(1, `transparent`);
                    ctx.beginPath(); ctx.arc(cx, cy, layerR, 0, Math.PI*2); ctx.fillStyle = layerGrd; ctx.fill();
                }
                // Badan utama gradien merah-oranye
                const mainGrd = ctx.createRadialGradient(cx - r*0.25, cy - r*0.25, 0, cx, cy, r);
                mainGrd.addColorStop(0, "#fef3c7");
                mainGrd.addColorStop(0.2, "#fb923c");
                mainGrd.addColorStop(0.6, "#ef4444");
                mainGrd.addColorStop(1, "#7f1d1d");
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = mainGrd; ctx.fill();
                // Lidah api di permukaan
                for (let i = 0; i < 14; i++) {
                    const a = (i/14)*Math.PI*2 + frame*0.004 + Math.sin(frame*0.03+i)*0.3;
                    const flareH = (18 + Math.sin(frame*0.08+i*1.3)*10) * s;
                    const fx = cx + Math.cos(a)*(r+flareH), fy = cy + Math.sin(a)*(r+flareH);
                    const baseX = cx + Math.cos(a)*r*0.95, baseY = cy + Math.sin(a)*r*0.95;
                    ctx.beginPath(); ctx.moveTo(baseX, baseY); ctx.lineTo(fx, fy);
                    ctx.strokeStyle = `rgba(253,186,116,${0.4+Math.sin(frame*0.1+i)*0.2})`; ctx.lineWidth = 2.5; ctx.stroke();
                }
                // Inti terang
                const coreGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r*0.25);
                coreGrd.addColorStop(0, "rgba(255,251,235,0.9)"); coreGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, r*0.25, 0, Math.PI*2); ctx.fillStyle = coreGrd; ctx.fill();
            }

            function drawNeutronStar(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Medan magnet — garis lengkung
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.008);
                for (let i = 0; i < 12; i++) {
                    const a = (i/12)*Math.PI*2;
                    ctx.beginPath();
                    for (let t = 0; t <= 1; t += 0.02) {
                        const fieldR = (40 + t * 160) * s;
                        const fieldA = a + Math.sin(t * Math.PI) * 0.6;
                        const fx = Math.cos(fieldA)*fieldR, fy = Math.sin(fieldA)*fieldR*0.5;
                        if (t === 0) ctx.moveTo(fx, fy); else ctx.lineTo(fx, fy);
                    }
                    ctx.strokeStyle = `rgba(103,232,249,${0.08 + Math.sin(frame*0.03+i)*0.04})`; ctx.lineWidth = 1.2; ctx.stroke();
                }
                ctx.restore();
                // Cincin akresi kecil
                ctx.save(); ctx.translate(cx, cy); ctx.scale(1, 0.25);
                const diskGrd = ctx.createRadialGradient(0,0,18*s,0,0,60*s);
                diskGrd.addColorStop(0, "rgba(103,232,249,0.8)"); diskGrd.addColorStop(0.5, "rgba(56,189,248,0.4)"); diskGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(0, 0, 60*s, 0, Math.PI*2); ctx.fillStyle = diskGrd; ctx.fill();
                ctx.restore();
                // Bintang neutron — sangat kecil, sangat terang
                const pulse = Math.sin(frame*0.15)*2;
                const starGrd = ctx.createRadialGradient(cx,cy,0,cx,cy,(14+pulse)*s);
                starGrd.addColorStop(0, "#ffffff"); starGrd.addColorStop(0.3, "#bae6fd"); starGrd.addColorStop(0.7, "rgba(56,189,248,0.3)"); starGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, (14+pulse)*s, 0, Math.PI*2); ctx.fillStyle = starGrd; ctx.fill();
                // Sinar-X burst cepat
                if (frame % 30 < 5) {
                    const burstGrd = ctx.createRadialGradient(cx,cy,0,cx,cy,80*s);
                    burstGrd.addColorStop(0, "rgba(186,230,253,0.3)"); burstGrd.addColorStop(1, "transparent");
                    ctx.beginPath(); ctx.arc(cx, cy, 80*s, 0, Math.PI*2); ctx.fillStyle = burstGrd; ctx.fill();
                }
            }

            function drawGammaRayBurst(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                const phase = (frame * 0.02) % (Math.PI * 2);
                // Afterglow — lingkaran memudar
                for (let i = 0; i < 5; i++) {
                    const glowR = ((frame * 0.8 + i * 50) % (Math.min(w,h)*0.6)) * s;
                    const glowO = Math.max(0, 1 - glowR/(Math.min(w,h)*0.6*s));
                    ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, Math.PI*2);
                    ctx.strokeStyle = `rgba(253,224,71,${glowO*0.3})`; ctx.lineWidth = 2; ctx.stroke();
                }
                // Jet gamma dua arah — sangat panjang dan menyilaukan
                [-1, 1].forEach(dir => {
                    const jetL = Math.min(w,h) * 0.48 * s;
                    const jetPulse = 0.6 + Math.sin(frame*0.15)*0.4;
                    ctx.save(); ctx.translate(cx, cy); ctx.rotate(dir === 1 ? 0 : Math.PI);
                    const jg = ctx.createLinearGradient(0, 0, jetL, 0);
                    jg.addColorStop(0, `rgba(255,255,200,${jetPulse})`);
                    jg.addColorStop(0.2, `rgba(253,224,71,${jetPulse*0.8})`);
                    jg.addColorStop(0.6, `rgba(251,146,60,${jetPulse*0.4})`);
                    jg.addColorStop(1, "transparent");
                    ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(jetL,-2*s); ctx.lineTo(jetL,2*s); ctx.lineTo(0,8);
                    ctx.fillStyle = jg; ctx.fill();
                    ctx.restore();
                });
                // Sumber ledakan di tengah
                const burstPulse = Math.abs(Math.sin(frame*0.1));
                const srcGrd = ctx.createRadialGradient(cx,cy,0,cx,cy,(30+burstPulse*15)*s);
                srcGrd.addColorStop(0, "#ffffff");
                srcGrd.addColorStop(0.2, "rgba(253,224,71,0.9)");
                srcGrd.addColorStop(0.6, "rgba(251,146,60,0.4)");
                srcGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, (30+burstPulse*15)*s, 0, Math.PI*2); ctx.fillStyle = srcGrd; ctx.fill();
                // Partikel terlontar
                for (let i = 0; i < 50; i++) {
                    const pa = (i/50)*Math.PI*2 + phase;
                    const pr = ((frame*1.2 + i*18) % (Math.min(w,h)*0.4)) * s;
                    const po = Math.max(0, 1 - pr/(Math.min(w,h)*0.4*s));
                    ctx.beginPath(); ctx.arc(cx+Math.cos(pa)*pr, cy+Math.sin(pa)*pr*0.4, 1.5, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(253,224,71,${po*0.7})`; ctx.fill();
                }
            }

            function drawBlazar(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Partikel galaksi spiral — sama seperti quasar
                for (let i = 0; i < 50; i++) {
                    const r2 = (frame * 2 + i * 20) % (Math.min(w,h)), a2 = (i * Math.PI * 2) / 50;
                    ctx.beginPath(); ctx.arc(cx + Math.cos(a2)*r2, cy + Math.sin(a2)*r2, Math.random()*2, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${1 - r2/Math.min(w,h)})`; ctx.fill();
                }
                // Piringan akresi — mirip quasar tapi warna ungu-biru
                const pulse = Math.sin(frame * 0.1) * 10;
                const coreGrd = ctx.createRadialGradient(cx, cy, 10, cx, cy, 120 + pulse);
                coreGrd.addColorStop(0, "#ffffff");
                coreGrd.addColorStop(0.15, "#a78bfa");
                coreGrd.addColorStop(0.4, "rgba(99,102,241,0.6)");
                coreGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 120+pulse, 0, Math.PI*2); ctx.fillStyle = coreGrd; ctx.fill();
                // Jet BELAKANG (menjauhi kita) — pendek dan redup, seperti quasar normal
                ctx.save(); ctx.translate(cx, cy);
                const jetBackPulse = Math.random()*0.15 + 0.1;
                const jbg = ctx.createLinearGradient(0, 0, 0, h/3);
                jbg.addColorStop(0, `rgba(139,92,246,${jetBackPulse})`); jbg.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-20,h/3); ctx.lineTo(20,h/3); ctx.lineTo(8,0);
                ctx.fillStyle = jbg; ctx.fill(); ctx.restore();
                // Jet DEPAN (mengarah ke kita / viewer) — jauh lebih besar, terang, melebar
                // Efek cone — makin dekat ke viewer makin lebar
                ctx.save(); ctx.translate(cx, cy);
                const jetFrontPulse = Math.random()*0.3 + 0.7;
                // Cone mekar — jet ke viewer tampak seperti lingkaran melebar
                for (let ring = 1; ring <= 6; ring++) {
                    const coneR = ring * 28 * s + Math.sin(frame * 0.08 + ring) * 5;
                    const coneO = (0.6 - ring * 0.08) * jetFrontPulse;
                    const coneGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, coneR);
                    coneGrd.addColorStop(0, `rgba(255,255,255,${coneO})`);
                    coneGrd.addColorStop(0.5, `rgba(167,139,250,${coneO*0.6})`);
                    coneGrd.addColorStop(1, `transparent`);
                    ctx.beginPath(); ctx.arc(0, 0, coneR, 0, Math.PI*2); ctx.fillStyle = coneGrd; ctx.fill();
                }
                // Ring kilat variabilitas — berkedip cepat karena jet mengarah langsung
                if (frame % 8 < 3) {
                    ctx.beginPath(); ctx.arc(0, 0, (30 + Math.random()*20)*s, 0, Math.PI*2);
                    ctx.strokeStyle = `rgba(255,255,255,${Math.random()*0.5+0.3})`; ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.restore();
                // Inti superterang
                const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 20*s);
                cg.addColorStop(0, "#ffffff"); cg.addColorStop(0.3, "rgba(196,181,253,1)"); cg.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 20*s, 0, Math.PI*2); ctx.fillStyle = cg; ctx.fill();
            }

            function drawTidalForce(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Lubang hitam di kiri
                const bhX = cx - 120 * s, bhY = cy;
                // Event horizon
                ctx.beginPath(); ctx.arc(bhX, bhY, 35 * s, 0, Math.PI * 2); ctx.fillStyle = "#000"; ctx.fill();
                ctx.beginPath(); ctx.arc(bhX, bhY, 35 * s, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(251,191,36,0.9)"; ctx.lineWidth = 2; ctx.stroke();
                // Piringan akresi BH
                ctx.save(); ctx.translate(bhX, bhY); ctx.scale(1, 0.22);
                const diskG = ctx.createRadialGradient(0, 0, 35*s, 0, 0, 100*s);
                diskG.addColorStop(0, "rgba(253,186,116,1)"); diskG.addColorStop(0.5, "rgba(239,68,68,0.7)"); diskG.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(0, 0, 100*s, 0, Math.PI*2); ctx.fillStyle = diskG; ctx.fill();
                ctx.restore();
                // Benda yang sedang di-spaghettify — diregangkan dari kiri ke kanan menuju BH
                const stretchPhase = (frame * 0.008) % 1;
                const objX = cx + 180 * s - stretchPhase * 280 * s;
                const objY = cy + Math.sin(stretchPhase * Math.PI * 2) * 30 * s;
                const stretchW = (6 + stretchPhase * 60) * s;
                const stretchH = Math.max(1, (12 - stretchPhase * 10)) * s;
                const spaghColor = `rgba(${Math.floor(100 + stretchPhase*155)},${Math.floor(200 - stretchPhase*150)},255,0.85)`;
                ctx.save(); ctx.translate(objX, objY);
                ctx.beginPath(); ctx.ellipse(0, 0, stretchW, stretchH, 0, 0, Math.PI * 2);
                ctx.fillStyle = spaghColor; ctx.fill(); ctx.restore();
                // Garis distorsi ruang-waktu
                for (let i = 0; i < 10; i++) {
                    const ly = cy - 80*s + i * 18 * s;
                    ctx.beginPath();
                    for (let x = cx + 200*s; x > bhX + 40*s; x -= 5) {
                        const dist = x - bhX;
                        const bend = (1200 * s * s) / (dist * dist) * 8;
                        const ky = ly + (ly > cy ? bend : -bend);
                        if (x === cx + 200*s) ctx.moveTo(x, ky); else ctx.lineTo(x, ky);
                    }
                    ctx.strokeStyle = `rgba(52,211,153,${0.06 + i * 0.01})`; ctx.lineWidth = 1; ctx.stroke();
                }
                // Label
                ctx.fillStyle = "rgba(148,163,184,0.7)"; ctx.font = `${10*s}px monospace`; ctx.textAlign = "center";
                ctx.fillText("Spaghettifikasi", cx + 60*s, cy + 80*s);
            }

            function drawSolarSystem2(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Dua bintang saling mengorbit (barycenter di tengah)
                const a1 = frame * 0.012, a2 = a1 + Math.PI;
                const sep = 70 * s;
                const s1x = cx + Math.cos(a1) * sep * 0.4, s1y = cy + Math.sin(a1) * sep * 0.4;
                const s2x = cx + Math.cos(a2) * sep * 0.6, s2y = cy + Math.sin(a2) * sep * 0.6;
                // Bintang A (kuning, lebih besar)
                const g1 = ctx.createRadialGradient(s1x, s1y, 0, s1x, s1y, 30*s);
                g1.addColorStop(0, "#fffbeb"); g1.addColorStop(0.3, "#fbbf24"); g1.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(s1x, s1y, 30*s, 0, Math.PI*2); ctx.fillStyle = g1; ctx.fill();
                // Bintang B (oranye, lebih kecil)
                const g2 = ctx.createRadialGradient(s2x, s2y, 0, s2x, s2y, 20*s);
                g2.addColorStop(0, "#fff7ed"); g2.addColorStop(0.3, "#f97316"); g2.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(s2x, s2y, 20*s, 0, Math.PI*2); ctx.fillStyle = g2; ctx.fill();
                // Label bintang
                ctx.fillStyle = "rgba(253,230,138,0.8)"; ctx.font = `${9*s}px monospace`; ctx.textAlign = "center";
                ctx.fillText("Bintang A", s1x, s1y - 34*s);
                ctx.fillStyle = "rgba(253,186,116,0.8)";
                ctx.fillText("Bintang B", s2x, s2y - 26*s);
                // 3 planet sirkumbiner mengorbit KEDUA bintang
                const planets = [
                    { r: 130, speed: 0.018, size: 5, color: "#86efac", offset: 0 },
                    { r: 190, speed: 0.011, size: 7, color: "#38bdf8", offset: 2.1 },
                    { r: 260, speed: 0.007, size: 6, color: "#f87171", offset: 4.5 }
                ];
                planets.forEach(p => {
                    const pa = frame * p.speed + p.offset;
                    const px2 = cx + Math.cos(pa) * p.r * s;
                    const py2 = cy + Math.sin(pa) * p.r * s * 0.7;
                    // Orbit elips
                    ctx.beginPath(); ctx.ellipse(cx, cy, p.r*s, p.r*s*0.7, 0, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 1; ctx.stroke();
                    // Planet
                    const pg = ctx.createRadialGradient(px2, py2, 0, px2, py2, p.size*s);
                    pg.addColorStop(0, p.color); pg.addColorStop(1, "rgba(0,0,0,0)");
                    ctx.beginPath(); ctx.arc(px2, py2, p.size*s, 0, Math.PI*2); ctx.fillStyle = pg; ctx.fill();
                });
                // Titik barycenter
                ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fill();
            }

            function drawStellarBH(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Bintang pendamping (donor star) yang materialnya tersedot
                const donorA = frame * 0.006;
                const donorX = cx + Math.cos(donorA) * 160 * s;
                const donorY = cy + Math.sin(donorA) * 160 * s;
                const dg = ctx.createRadialGradient(donorX, donorY, 0, donorX, donorY, 28*s);
                dg.addColorStop(0, "#fef3c7"); dg.addColorStop(0.4, "#f97316"); dg.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(donorX, donorY, 28*s, 0, Math.PI*2); ctx.fillStyle = dg; ctx.fill();
                // Aliran material dari donor ke BH (stream)
                ctx.beginPath();
                const steps = 40;
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const sx = donorX + (cx - donorX) * t + Math.sin(t * Math.PI * 3) * 20 * s * (1-t);
                    const sy = donorY + (cy - donorY) * t + Math.cos(t * Math.PI * 2) * 20 * s * t;
                    if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
                }
                ctx.strokeStyle = "rgba(251,146,60,0.6)"; ctx.lineWidth = 3*s; ctx.stroke();
                // Piringan akresi padat
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.02); ctx.scale(1, 0.3);
                for (let ring = 1; ring <= 5; ring++) {
                    const rr = (20 + ring * 14) * s;
                    const ag = ctx.createRadialGradient(0, 0, rr*0.7, 0, 0, rr*1.2);
                    const heat = 1 - ring * 0.15;
                    ag.addColorStop(0, `rgba(255,${Math.floor(200*heat)},50,${0.8*heat})`);
                    ag.addColorStop(1, "transparent");
                    ctx.beginPath(); ctx.arc(0, 0, rr*1.2, 0, Math.PI*2); ctx.fillStyle = ag; ctx.fill();
                }
                ctx.restore();
                // Lubang hitam inti
                ctx.beginPath(); ctx.arc(cx, cy, 22*s, 0, Math.PI*2); ctx.fillStyle = "#000"; ctx.fill();
                ctx.beginPath(); ctx.arc(cx, cy, 22*s, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(251,191,36,0.8)"; ctx.lineWidth = 2; ctx.stroke();
                // Jet kecil
                [-1, 1].forEach(dir => {
                    ctx.save(); ctx.translate(cx, cy);
                    const jg = ctx.createLinearGradient(0, 0, 0, dir * 90*s);
                    jg.addColorStop(0, "rgba(253,186,116,0.7)"); jg.addColorStop(1, "transparent");
                    ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(-1, dir*90*s); ctx.lineTo(1, dir*90*s); ctx.lineTo(5, 0);
                    ctx.fillStyle = jg; ctx.fill(); ctx.restore();
                });
            }

            function drawGalaxyCluster(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Gas panas antargalaksi (X-ray glow) — halo biru besar
                const hotGas = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200*s);
                hotGas.addColorStop(0, "rgba(99,102,241,0.12)");
                hotGas.addColorStop(0.4, "rgba(129,140,248,0.08)");
                hotGas.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 200*s, 0, Math.PI*2); ctx.fillStyle = hotGas; ctx.fill();
                // Posisi galaksi anggota (tetap + sedikit drift)
                const members = [
                    { ox: 0, oy: 0, type: "elliptical", size: 22, color: [253,230,138] },
                    { ox: -100, oy: -40, type: "spiral", size: 14, color: [125,211,252] },
                    { ox: 110, oy: -55, type: "spiral", size: 12, color: [134,239,172] },
                    { ox: -80, oy: 80, type: "elliptical", size: 10, color: [253,186,116] },
                    { ox: 130, oy: 60, type: "elliptical", size: 8, color: [216,180,254] },
                    { ox: -150, oy: 20, type: "spiral", size: 9, color: [147,197,253] },
                    { ox: 30, oy: 120, type: "elliptical", size: 7, color: [253,230,138] },
                    { ox: -30, oy: -110, type: "spiral", size: 11, color: [167,243,208] },
                    { ox: 170, oy: -20, type: "elliptical", size: 6, color: [253,186,116] },
                    { ox: -170, oy: -60, type: "spiral", size: 8, color: [196,181,253] }
                ];
                members.forEach((m, i) => {
                    const drift = Math.sin(frame * 0.003 + i) * 3;
                    const gx = cx + m.ox * s + drift, gy = cy + m.oy * s + drift * 0.5;
                    if (m.type === "elliptical") {
                        const eg = ctx.createRadialGradient(gx, gy, 0, gx, gy, m.size*s);
                        eg.addColorStop(0, `rgba(${m.color[0]},${m.color[1]},${m.color[2]},0.95)`);
                        eg.addColorStop(1, `rgba(${m.color[0]},${m.color[1]},${m.color[2]},0)`);
                        ctx.save(); ctx.translate(gx, gy); ctx.scale(1, 0.6);
                        ctx.beginPath(); ctx.arc(0, 0, m.size*s, 0, Math.PI*2); ctx.fillStyle = eg; ctx.fill();
                        ctx.restore();
                    } else {
                        ctx.save(); ctx.translate(gx, gy); ctx.rotate(frame * 0.004 + i);
                        for (let arm = 0; arm < 2; arm++) {
                            const ba = (arm / 2) * Math.PI * 2;
                            for (let j = 0; j < 30; j++) {
                                const t = j / 30, sp = t * Math.PI * 3 + ba, sr = t * m.size * s;
                                ctx.beginPath(); ctx.arc(Math.cos(sp)*sr, Math.sin(sp)*sr*0.5, 0.8, 0, Math.PI*2);
                                ctx.fillStyle = `rgba(${m.color[0]},${m.color[1]},${m.color[2]},${(1-t)*0.7})`; ctx.fill();
                            }
                        }
                        ctx.restore();
                    }
                });
                // BCG — Brightest Cluster Galaxy di pusat
                const bcgG = ctx.createRadialGradient(cx, cy, 0, cx, cy, 22*s);
                bcgG.addColorStop(0, "#ffffff"); bcgG.addColorStop(0.3, "rgba(253,230,138,0.9)"); bcgG.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 22*s, 0, Math.PI*2); ctx.fillStyle = bcgG; ctx.fill();
            }

            function drawTimeWorm(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Dua portal waktu — masa kini (kiri) dan masa lain (kanan)
                const p1x = cx - 150*s, p1y = cy;
                const p2x = cx + 150*s, p2y = cy;
                // Lorong waktu — distorsi berputar antara dua portal
                ctx.save(); ctx.translate(cx, cy);
                for (let i = 0; i < 20; i++) {
                    const t = i / 20;
                    const tunnelX = (-150 + t * 300) * s;
                    const tunnelH = (30 + Math.sin(t * Math.PI) * 40 + Math.sin(frame * 0.04 + t * 6) * 10) * s;
                    const tc = ctx.createRadialGradient(tunnelX, 0, 0, tunnelX, 0, tunnelH);
                    tc.addColorStop(0, `rgba(45,212,191,${0.15 + Math.sin(frame*0.05+t*4)*0.08})`);
                    tc.addColorStop(1, "transparent");
                    ctx.beginPath(); ctx.arc(tunnelX, 0, tunnelH, 0, Math.PI*2); ctx.fillStyle = tc; ctx.fill();
                }
                ctx.restore();
                // Partikel kronoklastik bergerak dari satu portal ke lain
                for (let i = 0; i < 25; i++) {
                    const t = ((frame * 0.01 + i * 0.04) % 1);
                    const px2 = p1x + (p2x - p1x) * t + Math.sin(t * Math.PI * 4 + i) * 15*s;
                    const py2 = cy + Math.sin(t * Math.PI) * 25*s * Math.sin(i);
                    const op = Math.sin(t * Math.PI);
                    ctx.beginPath(); ctx.arc(px2, py2, 2, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(45,212,191,${op * 0.8})`; ctx.fill();
                }
                // Portal masa kini — teal
                [p1x, p2x].forEach((px2, idx) => {
                    const portalPulse = Math.sin(frame * 0.06 + idx * Math.PI) * 5;
                    for (let ring = 3; ring >= 1; ring--) {
                        const pr = (20 + ring * 12 + portalPulse) * s;
                        ctx.beginPath(); ctx.arc(px2, cy, pr, 0, Math.PI*2);
                        ctx.strokeStyle = `rgba(${idx===0?'45,212,191':'251,191,36'},${0.6 - ring*0.15})`; ctx.lineWidth = 2; ctx.stroke();
                    }
                    const pg = ctx.createRadialGradient(px2, cy, 0, px2, cy, 20*s);
                    pg.addColorStop(0, idx===0?"rgba(45,212,191,0.9)":"rgba(251,191,36,0.9)");
                    pg.addColorStop(1, "transparent");
                    ctx.beginPath(); ctx.arc(px2, cy, 20*s, 0, Math.PI*2); ctx.fillStyle = pg; ctx.fill();
                });
                // Label
                ctx.fillStyle = "rgba(45,212,191,0.7)"; ctx.font = `${9*s}px monospace`; ctx.textAlign = "center";
                ctx.fillText("Masa Kini", p1x, cy + 55*s);
                ctx.fillStyle = "rgba(251,191,36,0.7)";
                ctx.fillText("Masa Lain", p2x, cy + 55*s);
            }

            function drawHotJupiter(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Bintang induk — sangat dekat, di pojok kiri atas
                const starX = cx - w*0.28, starY = cy - h*0.22;
                const sgrd = ctx.createRadialGradient(starX, starY, 0, starX, starY, 70*s);
                sgrd.addColorStop(0, "#ffffff"); sgrd.addColorStop(0.2, "#fde68a"); sgrd.addColorStop(0.5, "rgba(253,230,138,0.5)"); sgrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(starX, starY, 70*s, 0, Math.PI*2); ctx.fillStyle = sgrd; ctx.fill();
                // Orbit sangat kecil — dekat bintang
                ctx.beginPath(); ctx.ellipse(starX, starY, 130*s, 50*s, 0.3, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 1; ctx.stroke();
                // Hot Jupiter mengorbit cepat
                const hja = frame * 0.025;
                const hjx = starX + Math.cos(hja) * 130*s;
                const hjy = starY + Math.sin(hja) * 50*s;
                const r = Math.min(w,h) * 0.17 * s;
                // Sisi siang (menghadap bintang) — merah membara
                const dayAngle = Math.atan2(hjy - starY, hjx - starX);
                const dayGrd = ctx.createRadialGradient(hjx + Math.cos(dayAngle)*r*0.3, hjy + Math.sin(dayAngle)*r*0.3, 0, hjx, hjy, r);
                dayGrd.addColorStop(0, "#fff7ed"); dayGrd.addColorStop(0.2, "#fb923c"); dayGrd.addColorStop(0.5, "#c2410c"); dayGrd.addColorStop(1, "#1c0800");
                ctx.beginPath(); ctx.arc(hjx, hjy, r, 0, Math.PI*2); ctx.fillStyle = dayGrd; ctx.fill();
                // Badai zona terminator — garis berputar
                ctx.save(); ctx.translate(hjx, hjy); ctx.rotate(frame * 0.015);
                for (let i = 0; i < 6; i++) {
                    const by = -r + i * r*0.35;
                    ctx.beginPath(); ctx.moveTo(-r*0.8, by); ctx.bezierCurveTo(-r*0.3, by+8*s, r*0.3, by-8*s, r*0.8, by);
                    ctx.strokeStyle = `rgba(251,146,60,${0.2+i*0.05})`; ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.restore();
                // Atmosfer glow panas
                const atmGrd = ctx.createRadialGradient(hjx, hjy, r, hjx, hjy, r+20*s);
                atmGrd.addColorStop(0, "rgba(251,146,60,0.4)"); atmGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(hjx, hjy, r+20*s, 0, Math.PI*2); ctx.fillStyle = atmGrd; ctx.fill();
                // Ekor atmosfer tersapu angin bintang
                const tailAngle = Math.atan2(hjy - starY, hjx - starX);
                const tgrd = ctx.createLinearGradient(hjx, hjy, hjx + Math.cos(tailAngle)*100*s, hjy + Math.sin(tailAngle)*100*s);
                tgrd.addColorStop(0, "rgba(251,146,60,0.25)"); tgrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.ellipse(hjx + Math.cos(tailAngle)*50*s, hjy + Math.sin(tailAngle)*50*s, 80*s, 15*s, tailAngle, 0, Math.PI*2);
                ctx.fillStyle = tgrd; ctx.fill();
            }

            function drawRingworld(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Bintang di tengah
                const sgrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 35*s);
                sgrd.addColorStop(0, "#fff"); sgrd.addColorStop(0.3, "#fef08a"); sgrd.addColorStop(0.7, "rgba(253,224,71,0.3)"); sgrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, 35*s, 0, Math.PI*2); ctx.fillStyle = sgrd; ctx.fill();
                // Ringworld — cincin raksasa berputar pelan
                const ringR = 155 * s;
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.003);
                // Struktur cincin — tampak dari samping sedikit miring
                ctx.scale(1, 0.28);
                // Sisi luar cincin (tanah/lautan)
                ctx.beginPath(); ctx.arc(0, 0, ringR, 0, Math.PI*2);
                ctx.strokeStyle = "#4ade80"; ctx.lineWidth = 16*s; ctx.stroke();
                // Garis lautan di permukaan cincin
                for (let i = 0; i < 20; i++) {
                    const a = (i/20)*Math.PI*2 + frame*0.003;
                    const lx = Math.cos(a)*ringR, ly = Math.sin(a)*ringR;
                    ctx.beginPath(); ctx.arc(lx, ly, 4*s, 0, Math.PI*2);
                    ctx.fillStyle = i%3===0 ? "rgba(56,189,248,0.7)" : "rgba(74,222,128,0.5)"; ctx.fill();
                }
                // Dinding tepi
                ctx.beginPath(); ctx.arc(0, 0, ringR+12*s, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(156,163,175,0.4)"; ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, ringR-12*s, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(156,163,175,0.4)"; ctx.lineWidth = 3; ctx.stroke();
                ctx.restore();
                // Shadow strip — sisi malam dari bayangan panel
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(frame * 0.003 + 0.1); ctx.scale(1, 0.28);
                for (let i = 0; i < 8; i++) {
                    const a = (i/8)*Math.PI*2;
                    const sx = Math.cos(a)*ringR, sy = Math.sin(a)*ringR;
                    ctx.beginPath(); ctx.arc(sx, sy, 6*s, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(15,23,42,0.6)"; ctx.fill();
                }
                ctx.restore();
                // Glow hijau keseluruhan
                const glow = ctx.createRadialGradient(cx, cy, ringR*0.85, cx, cy, ringR*1.1);
                glow.addColorStop(0, "rgba(74,222,128,0.06)"); glow.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, ringR*1.1, 0, Math.PI*2); ctx.fillStyle = glow; ctx.fill();
            }

            function drawBigBang(ctx, cx, cy, frame, w, h) {
                const s = deepZoom;
                // Fase — siklus dari singularitas → ekspansi
                const phase = (frame * 0.004) % 1;
                const expandR = phase * Math.min(w,h) * 0.55 * s;
                // Layer CMB — radiasi latar microwave (merah-oranye di tepi)
                if (phase > 0.3) {
                    const cmb = ctx.createRadialGradient(cx, cy, expandR*0.7, cx, cy, expandR);
                    const cmbO = Math.min(1, (phase-0.3)*3);
                    cmb.addColorStop(0, `rgba(251,146,60,0)`);
                    cmb.addColorStop(0.6, `rgba(239,68,68,${cmbO*0.3})`);
                    cmb.addColorStop(1, `rgba(15,23,42,0)`);
                    ctx.beginPath(); ctx.arc(cx, cy, expandR, 0, Math.PI*2); ctx.fillStyle = cmb; ctx.fill();
                }
                // Partikel quark-gluon plasma terlontar ke segala arah
                for (let i = 0; i < 120; i++) {
                    const a = (i/120)*Math.PI*2 + i*0.3;
                    const dist = expandR * (0.2 + (i%5)*0.16);
                    if (dist > expandR) continue;
                    const px2 = cx + Math.cos(a)*dist, py2 = cy + Math.sin(a)*dist;
                    const heat = 1 - dist/expandR;
                    const r2 = Math.floor(255), g2 = Math.floor(heat*200), b2 = Math.floor(heat*50);
                    ctx.beginPath(); ctx.arc(px2, py2, Math.random()*2.5+0.5, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(${r2},${g2},${b2},${heat*0.7})`; ctx.fill();
                }
                // Gelombang kejut ekspansi
                for (let wave = 0; wave < 4; wave++) {
                    const wr = expandR * (1 - wave*0.06);
                    if (wr < 0) continue;
                    const wo = Math.max(0, 0.5 - wave*0.1) * (1-phase);
                    ctx.beginPath(); ctx.arc(cx, cy, wr, 0, Math.PI*2);
                    ctx.strokeStyle = `rgba(253,186,116,${wo})`; ctx.lineWidth = 3-wave*0.5; ctx.stroke();
                }
                // Inti — singularitas awal (selalu ada di tengah, makin kecil saat ekspansi)
                const singR = Math.max(3, (25 - phase*22)) * s;
                const temp = 1 - phase;
                const singGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, singR);
                singGrd.addColorStop(0, "#ffffff");
                singGrd.addColorStop(0.3, `rgba(255,${Math.floor(200*temp)},${Math.floor(50*temp)},1)`);
                singGrd.addColorStop(1, "transparent");
                ctx.beginPath(); ctx.arc(cx, cy, singR, 0, Math.PI*2); ctx.fillStyle = singGrd; ctx.fill();
                // Label fase
                ctx.fillStyle = "rgba(148,163,184,0.6)"; ctx.font = `${10*s}px monospace`; ctx.textAlign = "center";
                const phaseLabel = phase < 0.05 ? "t = 0 (Singularitas)" : phase < 0.25 ? "Inflasi Kosmik" : phase < 0.5 ? "Quark-Gluon Plasma" : phase < 0.75 ? "Pembentukan Atom" : "Cosmic Microwave Background";
                ctx.fillText(phaseLabel, cx, cy + Math.min(w,h)*0.38*s);
            }

            // ==========================================
            // STARFIELD — latar bintang untuk semua view
            // ==========================================
            const STARS = Array.from({ length: 220 }, () => ({
                x: Math.random(), y: Math.random(),
                r: Math.random() * 1.3 + 0.2,
                twinkle: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.03 + 0.01
            }));

            function drawStarfield(ctx, w, h, frame) {
                for (const star of STARS) {
                    const br = 0.3 + Math.sin(frame * star.speed + star.twinkle) * 0.25;
                    ctx.beginPath(); ctx.arc(star.x * w, star.y * h, star.r, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${br})`; ctx.fill();
                }
            }
            function loop() {
                const w = canvas.width, h = canvas.height;
                const cx = w / 2, cy = h / 2;
                ctx.clearRect(0, 0, w, h);

                // Starfield di semua view kecuali solar (solar punya bintang sendiri)
                if (view !== "solar") drawStarfield(ctx, w, h, frame);

                if (view === "blackhole") drawBlackHole(ctx, cx, cy, frame, w, h);
                else if (view === "pulsar") drawPulsar(ctx, cx, cy, frame, w, h);
                else if (view === "quasar") drawQuasar(ctx, cx, cy, frame, w, h);
                else if (view === "nebula") drawNebula(ctx, cx, cy, frame, w, h);
                else if (view === "supernova") drawSupernova(ctx, cx, cy, frame, w, h);
                else if (view === "wormhole") drawWormhole(ctx, cx, cy, frame, w, h);
                else if (view === "magnetar") drawMagnetar(ctx, cx, cy, frame, w, h);
                else if (view === "binary") drawBinaryStar(ctx, cx, cy, frame, w, h);
                else if (view === "uyscuti") drawUYScuti(ctx, cx, cy, frame, w, h);
                else if (view === "exoplanet") drawExoplanet(ctx, cx, cy, frame, w, h);
                else if (view === "darkmatter") drawDarkMatter(ctx, cx, cy, frame, w, h);
                else if (view === "collision") drawGalacticCollision(ctx, cx, cy, frame, w, h);
                else if (view === "whitehole") drawWhiteHole(ctx, cx, cy, frame, w, h);
                else if (view === "protostar") drawProtostar(ctx, cx, cy, frame, w, h);
                else if (view === "dyson") drawDysonSphere(ctx, cx, cy, frame, w, h);
                else if (view === "comet") drawComet(ctx, cx, cy, frame, w, h);
                else if (view === "asteroidbelt") drawAsteroidBelt(ctx, cx, cy, frame, w, h);
                else if (view === "cosmicweb") drawCosmicWeb(ctx, cx, cy, frame, w, h);
                else if (view === "redgiant") drawRedGiant(ctx, cx, cy, frame, w, h);
                else if (view === "neutronstar") drawNeutronStar(ctx, cx, cy, frame, w, h);
                else if (view === "gammaray") drawGammaRayBurst(ctx, cx, cy, frame, w, h);
                else if (view === "blazar") drawBlazar(ctx, cx, cy, frame, w, h);
                else if (view === "tidalforce") drawTidalForce(ctx, cx, cy, frame, w, h);
                else if (view === "solarsystem2") drawSolarSystem2(ctx, cx, cy, frame, w, h);
                else if (view === "stellarbh") drawStellarBH(ctx, cx, cy, frame, w, h);
                else if (view === "galaxycluster") drawGalaxyCluster(ctx, cx, cy, frame, w, h);
                else if (view === "timeworm") drawTimeWorm(ctx, cx, cy, frame, w, h);
                else if (view === "hotjupiter") drawHotJupiter(ctx, cx, cy, frame, w, h);
                else if (view === "ringworld") drawRingworld(ctx, cx, cy, frame, w, h);
                else if (view === "bigbang") drawBigBang(ctx, cx, cy, frame, w, h);
                else if (view === "milky" || view === "andromeda") drawGalaxy(ctx, cx, cy, frame, w, h, view);
                else {
                    // Mode Tata Surya (Solar)
                    for(let i=0; i<10; i++) { ctx.fillStyle=`rgba(255,255,255,${Math.random()})`; ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1); }

                    // Hitung posisi planet dulu, simpan ke planetPos
                    const planetPos = {};
                    for (const key in SOLAR_DATA) {
                        const p = SOLAR_DATA[key];
                        if (p.moon) continue; // lewati satelit dulu
                        const d = (p.distance || 0) * zoom;
                        let px = cx, py = cy;
                        if (p.speed) {
                            angles[key] += p.speed * 0.003;
                            px = cx + Math.cos(angles[key]) * d;
                            py = cy + Math.sin(angles[key]) * d;
                            // Garis orbit planet
                            ctx.beginPath(); ctx.arc(cx, cy, d, 0, Math.PI * 2);
                            ctx.strokeStyle = "rgba(255,255,255,0.03)"; ctx.lineWidth = 1; ctx.stroke();
                        }
                        planetPos[key] = { x: px, y: py };
                    }

                    // Pass 1: Gambar planet (bukan satelit)
                    for (const key in SOLAR_DATA) {
                        const p = SOLAR_DATA[key];
                        if (p.moon) continue;
                        const { x: px, y: py } = planetPos[key];
                        const r = p.radius * zoom;

                        if (p.emissive) {
                            const grd = ctx.createRadialGradient(px, py, 0, px, py, r * 2.5);
                            grd.addColorStop(0, p.color + "cc"); grd.addColorStop(0.3, p.color + "33"); grd.addColorStop(1, "transparent");
                            ctx.beginPath(); ctx.arc(px, py, r * 2.5, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
                        }
                        const grad = ctx.createRadialGradient(px - r*0.3, py - r*0.3, 0, px, py, r);
                        grad.addColorStop(0, lightenColor(p.color, 30)); grad.addColorStop(1, darkenColor(p.color, 50));
                        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();

                        if (p.ring) {
                            ctx.save(); ctx.translate(px, py); ctx.scale(1, 0.35);
                            ctx.beginPath(); ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2); ctx.strokeStyle = "rgba(252, 211, 77, 0.4)"; ctx.lineWidth = r * 0.4; ctx.stroke();
                            ctx.beginPath(); ctx.arc(0, 0, r * 2.6, 0, Math.PI * 2); ctx.strokeStyle = "rgba(252, 211, 77, 0.15)"; ctx.lineWidth = r * 0.2; ctx.stroke();
                            ctx.restore();
                        }
                        ctx.fillStyle = "rgba(148, 163, 184, 0.8)";
                        ctx.font = `500 ${Math.max(9, 10 * zoom)}px sans-serif`;
                        ctx.textAlign = "center";
                        ctx.fillText(key, px, py + r + 16);
                    }

                    // Pass 2: Gambar satelit mengorbit planet induknya
                    for (const key in SOLAR_DATA) {
                        const p = SOLAR_DATA[key];
                        if (!p.moon) continue;
                        const par = planetPos[p.parent];
                        if (!par) continue;

                        angles[key] += p.speed * 0.005;
                        const orb = p.orbitRadius * zoom;
                        const mx = par.x + Math.cos(angles[key]) * orb;
                        const my = par.y + Math.sin(angles[key]) * orb;
                        const r = p.radius * zoom;

                        // Garis orbit satelit di sekitar planet induk
                        ctx.beginPath(); ctx.arc(par.x, par.y, orb, 0, Math.PI * 2);
                        ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 0.8; ctx.stroke();

                        const grad = ctx.createRadialGradient(mx - r*0.3, my - r*0.3, 0, mx, my, r);
                        grad.addColorStop(0, lightenColor(p.color, 30)); grad.addColorStop(1, darkenColor(p.color, 50));
                        ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();

                        ctx.fillStyle = "rgba(148, 163, 184, 0.7)";
                        ctx.font = `500 ${Math.max(7, 8 * zoom)}px sans-serif`;
                        ctx.textAlign = "center";
                        ctx.fillText(key, mx, my + r + 11);
                    }
                }
                
                if (view !== "solar" && !selected) hintText.classList.remove('hidden');
                else hintText.classList.add('hidden');

                frame++;
                requestAnimationFrame(loop);
            }

            renderMenu();
            loop();
        }
    });
  </script>
